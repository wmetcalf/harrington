name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Fmt
        run: cargo fmt --check

  msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV
        run: rustup install 1.78.0
      - name: MSRV check (lib only)
        run: cargo +1.78.0 check -p batdeob-core

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly
        run: rustup install nightly --component rust-src
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Smoke fuzz
        working-directory: rust/fuzz
        run: cargo +nightly fuzz run analyze -- -runs=5000 -max_total_time=120
